<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Voice Escape</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div id="intro">

  <h1>VOICE ESCAPE</h1>
  <p>Sound is your only weapon.</p>

</div>

<div class="hud">

  <div>ENERGY: <span id="energy">100</span></div>

  <div>SCORE: <span id="score">0</span></div>

</div>

<canvas id="game"></canvas>

<div id="pauseMenu">

  <h2>PAUSED</h2>

  <button onclick="resumeGame()">
    RESUME
  </button>

</div>

<div id="gameOver">

  <h1>GAME OVER</h1>

  <button onclick="restartGame()">
    RESTART
  </button>

</div>

<script src="script.js"></script>

</body>
</html>
